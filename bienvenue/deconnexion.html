<!DOCTYPE html>
<html lang="fr">

<head>
    <style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    font-family:Arial,sans-serif;

    background:
    linear-gradient(
        135deg,
        #020617,
        #0f172a,
        #1e3a8a
    );

    color:white;
}



/* ==========================
   CONTENEUR
========================== */

.container{

    width:90%;
    max-width:700px;

    text-align:center;

    padding:50px;

    border-radius:25px;

    background:rgba(255,255,255,0.05);

    backdrop-filter:blur(10px);

    box-shadow:
    0 0 30px rgba(56,189,248,0.2);
}



/* ==========================
   TITRE
========================== */

h1{

    font-size:60px;

    margin-bottom:20px;

    color:white;

    text-shadow:
        0 0 10px #38bdf8,
        0 0 20px #38bdf8,
        0 0 40px #38bdf8;
}



/* ==========================
   TEXTE
========================== */

p{

    font-size:20px;

    line-height:1.8;

    color:#cbd5e1;

    margin-bottom:40px;
}



/* ==========================
   BOUTONS
========================== */

.buttons{

    display:flex;

    justify-content:center;

    gap:20px;

    flex-wrap:wrap;
}



button{

    padding:15px 30px;

    border:none;

    border-radius:15px;

    cursor:pointer;

    font-size:17px;

    font-weight:bold;

    color:white;

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #38bdf8
    );

    transition:0.3s;
}



button:hover{

    transform:translateY(-5px);

    box-shadow:
    0 0 25px rgba(56,189,248,0.6);
}
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Déconnexion - Binary</title>

    <link rel="stylesheet" href="../CSS/deconnexion.css">
</head>

<body>

    <div class="container">

        <h1>À bientôt 👋</h1>

        <p>

            Merci d'avoir utilisé Binary.

            <br><br>

            Continue à apprendre le langage binaire et à progresser
            dans le monde de l'informatique !
        

        </p>
        <button class="btn-reconnecter" onclick="window.location.href='../bienvenue/seconnecter.html'">se reconnecter</button>

        
    </div>
    
</body>

</html>
